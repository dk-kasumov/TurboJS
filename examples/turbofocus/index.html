<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TurboFocus</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #181b22;
        --line: #272b34;
        --text: #e8eaed;
        --muted: #8b93a1;
        --accent: #ff6b5e;
      }
      .app.rest {
        --accent: #34d399;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.5 system-ui, sans-serif;
      }
      .app {
        max-width: 420px;
        margin: 0 auto;
        padding: 32px 20px 64px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .hero {
        text-align: center;
      }
      .hero h1 {
        margin: 0;
        font-size: 28px;
        color: var(--accent);
      }
      .muted {
        color: var(--muted);
        margin: 0;
      }
      .tabs {
        display: flex;
        gap: 8px;
      }
      .tab {
        flex: 1;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
      }
      .tab.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .timer,
      .panel,
      .stats {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
      }
      .timer {
        text-align: center;
      }
      .timer-mode {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 12px;
      }
      .clock {
        font-size: 56px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        margin: 4px 0 12px;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      .btn {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
      }
      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #0f1115;
        font-weight: 600;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .stats {
        display: flex;
        gap: 20px;
      }
      .stat {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .stat strong {
        font-size: 28px;
        color: var(--accent);
      }
      .panel h2 {
        margin: 0 0 12px;
        font-size: 14px;
      }
      .stepper {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 0;
      }
      .stepper-label {
        flex: 1;
      }
      .stepper-value {
        width: 28px;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .round {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font-size: 16px;
      }
      .sessions {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .session {
        display: flex;
        justify-content: space-between;
        padding: 8px 12px;
        background: var(--bg);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
